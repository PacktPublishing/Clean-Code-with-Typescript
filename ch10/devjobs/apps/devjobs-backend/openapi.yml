openapi: 3.0.3
info:
  title: DevJobs API
  version: 1.0.0
  description: API for the DevJobs platform

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /users:
    get:
      summary: List all users
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'  # Use secure response type

    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $reg: '#/components/schemas/CreateUser'  # Input with password
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'  # No password in response

  /companies:
    get:
      summary: List all companies
      responses:
        '200':
          description: Array of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyResponse'

    post:
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompany'
      responses:
        '201':
          description: Created company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'

  /jobs:
    get:
      summary: List all jobs
      responses:
        '200':
          description: Array of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'

    post:
      summary: Create a new job posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJob'
      responses:
        '201':
          description: Created job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'

components:
  schemas:
    # Enums (reusable)
    UserRole:
      type: string
      enum: [jobSeeker, companyUser]
      description: User role

    # Base for User (common fields)
    BaseUser:
      type: object
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        role:
          $ref: '#/components/schemas/UserRole'
        companyId:
          type: string
          format: uuid
          description: "Required if role is companyUser"
      required:
        - name
        - email
        - role

    # Input: Extends base + password
    CreateUser:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            password:
              type: string
              format: password
              writeOnly: true  # OpenAPI hint: don't include in responses
          required:
            - password

    # Output: Extends base + id (no password)
    UserResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseUser'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "u123e456-78ab-90cd-ef12-3456789abcde"
          required:
            - id

    # Base for Company
    BaseCompany:
      type: object
      properties:
        name:
          type: string
          example: OpenAI
        website:
          type: string
          example: https://openai.com
      required:
        - name

    # Input/Output for Company (simple; could merge if no diffs)
    CreateCompany:
      $ref: '#/components/schemas/BaseCompany'  # Reuse base

    CompanyResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseCompany'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "c123e456-78ab-90cd-ef12-3456789abcde"
          required:
            - id

    # Base for Job
    BaseJob:
      type: object
      properties:
        title:
          type: string
          example: Software Engineer
        companyId:
          type: string
          format: uuid
          description: "Reference to the company that created this job"
        location:
          type: string
          example: Remote
        description:
          type: string
      required:
        - title
        - companyId
        - location

    # Input: Extends base (add description if optional)
    CreateJob:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseJob'
        - type: object
          properties:
            description:
              type: string

    # Output: Extends base + id
    JobResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseJob'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: "j987e654-32ba-10dc-fe21-9876543fedcb"
            description:
              type: string
          required:
            - id